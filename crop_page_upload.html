<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>MinuteBytes | Upload Image</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <!-- Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#006573",
                        "primary-dim": "#005865",
                        "secondary": "#3854b7",
                        "on-primary": "#dbf8ff",
                        "surface": "#f5f6f7",
                        "on-surface": "#2c2f30",
                        "on-surface-variant": "#595c5d",
                        "surface-container-lowest": "#ffffff",
                        "primary-container": "#5de3fc",
                        "secondary-container": "#c6cfff",
                        "on-secondary-container": "#1f3ea2",
                        "outline-variant": "#abadae",
                        "surface-container-high": "#e0e3e4",
                        "surface-container-low": "#eff1f2"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .bg-MinuteBytes-gradient { background: radial-gradient(circle at 50% -20%, #dbf8ff 0%, #f5f6f7 100%); }
        @media (max-width: 768px) {
            main,
            #editor-section,
            #upload-section,
            #drop-zone,
            main section,
            main aside,
            main .max-w-7xl,
            main .max-w-6xl,
            main .max-w-5xl,
            main .max-w-4xl,
            main .max-w-3xl,
            main .max-w-2xl {
                width: 100%;
                max-width: 100%;
            }

            main .flex,
            main .inline-flex {
                flex-wrap: wrap;
            }

            main button,
            main input,
            main select,
            main textarea,
            main a.inline-block {
                width: 100%;
                max-width: 100%;
            }
        }
    </style>
</head>

<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col selection:bg-primary-container selection:text-on-primary-container">
    <div id="header-placeholder"></div>
    <script src="header.js"></script>
    <main class="flex-grow flex flex-col items-center justify-center px-6 py-24 bg-MinuteBytes-gradient">
        <div class="text-center max-w-3xl mb-16 space-y-6">
            <h1 class="font-headline text-5xl md:text-6xl font-extrabold tracking-tight text-on-surface leading-tight">
                Crop with <span class="text-primary italic">Finesse</span>
            </h1>
            <p class="text-lg md:text-xl text-on-surface-variant leading-relaxed font-light">
                Identify the focus. Remove the noise. Perfectly frame your images for any platform with surgical precision.
            </p>
        </div>

        <div id="upload-section" class="w-full max-w-4xl relative">
            <div id="drop-zone" class="relative z-10 bg-surface-container-lowest rounded-xl p-2 shadow-[0_20px_40px_rgba(44,47,48,0.06)] group cursor-pointer transition-all duration-300">
                <div class="border-2 border-dashed border-outline-variant/30 rounded-lg p-12 md:p-24 flex flex-col items-center justify-center text-center space-y-8 transition-all duration-300 group-hover:border-primary/40 group-hover:bg-primary-container/5">
                    <div class="relative">
                        <div class="w-20 h-20 bg-surface-container-low rounded-full flex items-center justify-center text-primary group-hover:scale-110 transition-transform duration-300">
                            <span class="material-symbols-outlined text-4xl">crop</span>
                        </div>
                    </div>
                    <div class="space-y-4">
                        <button id="upload-btn" class="bg-gradient-to-br from-primary to-primary-dim text-on-primary font-semibold px-10 py-4 rounded-full text-lg shadow-lg active:scale-95 transition-transform">
                            Choose Image
                        </button>
                        <input type="file" id="file-input" accept="image/jpeg,image/png,image/webp,image/svg+xml" class="hidden">
                        <p class="text-on-surface-variant font-medium text-sm tracking-wide">OR DRAG AND DROP IMAGES HERE</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Why MinuteBytes Section -->
        <div class="mt-20 flex flex-col md:flex-row gap-8 items-center text-center md:text-left">
            <h3 class="font-headline font-bold text-on-surface-variant text-sm uppercase tracking-[0.2em]">Why MinuteBytes?</h3>
            <div class="flex flex-wrap justify-center md:justify-start gap-6">
                <div class="flex items-center space-x-3 bg-surface-container-low px-6 py-3 rounded-lg border border-outline-variant/10">
                    <span class="material-symbols-outlined text-primary">verified_user</span>
                    <span class="font-medium text-on-surface text-sm">Local Processing</span>
                </div>
                <div class="flex items-center space-x-3 bg-surface-container-low px-6 py-3 rounded-lg border border-outline-variant/10">
                    <span class="material-symbols-outlined text-primary">crop_free</span>
                    <span class="font-medium text-on-surface text-sm">Aspect Presets</span>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>
    <script src="footer.js"></script>

    <script>
        const fileInput = document.getElementById('file-input');
        const uploadBtn = document.getElementById('upload-btn');
        const dropZone = document.getElementById('drop-zone');

        const handleFiles = (files) => {
            if (files.length === 0) return;
            const file = files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                sessionStorage.setItem('originalImage', e.target.result);
                sessionStorage.setItem('originalFileName', file.name);
                sessionStorage.setItem('originalFileType', file.type);
                sessionStorage.setItem('originalFileSize', file.size);
                window.location.href = 'crop_page_edit.html';
            };
            reader.readAsDataURL(file);
        };

        uploadBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));
        
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('bg-primary-container/10'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('bg-primary-container/10'));
        dropZone.addEventListener('drop', (e) => { e.preventDefault(); handleFiles(e.dataTransfer.files); });
    </script>
</body>
</html>
