<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>LuminaCrop | Editor</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <!-- Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#006573",
                        "primary-dim": "#005865",
                        "secondary": "#3854b7",
                        "on-primary": "#dbf8ff",
                        "surface": "#f5f6f7",
                        "on-surface": "#2c2f30",
                        "on-surface-variant": "#595c5d",
                        "surface-container-lowest": "#ffffff",
                        "primary-container": "#5de3fc",
                        "secondary-container": "#c6cfff",
                        "on-secondary-container": "#1f3ea2",
                        "outline-variant": "#abadae",
                        "surface-container-high": "#e0e3e4",
                        "surface-container-low": "#eff1f2",
                        "error": "#b31b25"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
                },
            },
        }
    </script>
    <!-- Cropper.js -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .bg-ethereal-gradient { background: radial-gradient(circle at 50% -20%, #dbf8ff 0%, #f5f6f7 100%); }
        
        /* Cropper customization */
        .cropper-line, .cropper-point { background-color: #006573; }
        .cropper-view-box { outline-color: #006573; }
    </style>
</head>

<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col selection:bg-primary-container selection:text-on-primary-container">
    <div id="header-placeholder"></div>
    <script src="header.js"></script>

    <main id="editor-section" class="flex-grow flex flex-col items-center justify-start px-6 py-24 bg-ethereal-gradient">
        <div class="text-center max-w-3xl mb-12 space-y-4">
            <h1 class="font-headline text-4xl md:text-5xl font-extrabold tracking-tight text-on-surface leading-tight">
                Perfect <span class="text-primary italic">Precision</span> Frame
            </h1>
        </div>

        <div class="w-full max-w-7xl">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 items-start">
                
                <!-- Workspace Content -->
                <section class="lg:col-span-8 space-y-8">
                    <div class="space-y-4">
                        <div class="flex justify-between items-center px-1">
                            <span class="text-[10px] font-bold tracking-[0.2em] uppercase text-on-surface-variant">Interactive Workspace</span>
                            <span id="aspect-ratio-display" class="text-[10px] font-bold text-primary tracking-widest uppercase">Free Ratio</span>
                        </div>
                        <div class="bg-surface-container-lowest rounded-xl p-4 md:p-8 shadow-[0_20px_40px_rgba(44,47,48,0.06)] border border-outline-variant/10 min-h-[500px] flex items-center justify-center overflow-hidden bg-surface-container-low group">
                            <div class="w-full h-full max-h-[600px]">
                                <img id="image-to-crop" alt="Edit Target" class="max-w-full block" src="" />
                            </div>
                        </div>
                    </div>

                    <!-- Metadata Footer -->
                    <div class="flex items-center justify-between p-8 bg-white/40 backdrop-blur-sm rounded-2xl border border-outline-variant/10 shadow-sm">
                        <div class="flex items-center gap-6">
                            <div class="w-12 h-12 rounded-full bg-secondary-container flex items-center justify-center text-on-secondary-container">
                                <span class="material-symbols-outlined">crop_original</span>
                            </div>
                            <div>
                                <p id="file-name-display" class="font-headline font-bold text-on-surface">image_name.jpg</p>
                                <p id="file-info-description" class="font-label text-xs text-on-surface-variant opacity-70 uppercase tracking-widest"><span id="format-display">JPG</span> • <span id="selection-display">0 × 0 PX</span></p>
                            </div>
                        </div>
                        <button id="clear-btn" class="text-error font-bold text-[10px] tracking-[0.2em] uppercase hover:underline underline-offset-4 flex items-center gap-2">
                            <span class="material-symbols-outlined text-sm">restart_alt</span>
                            Reset
                        </button>
                    </div>
                </section>

                <!-- Sidebar Controls -->
                <aside class="lg:col-span-4 space-y-8">
                    <div class="bg-surface-container-high p-8 md:p-10 rounded-xl space-y-10 relative overflow-hidden border border-outline-variant/10 shadow-sm">
                        
                        <!-- Ratio Selection -->
                        <div class="space-y-6">
                            <label class="font-label text-[10px] font-bold tracking-[0.2em] uppercase text-on-surface-variant block">Frame & Ratio</label>
                            <div class="grid grid-cols-3 gap-2">
                                <button class="ratio-btn py-3 rounded-md bg-primary text-white font-bold text-xs shadow-md shadow-primary/20 transition-all font-black" data-ratio="NaN">Free</button>
                                <button class="ratio-btn py-3 rounded-md bg-surface-container-highest text-on-surface-variant font-bold text-xs hover:bg-surface-container-lowest transition-all" data-ratio="1">1:1</button>
                                <button class="ratio-btn py-3 rounded-md bg-surface-container-highest text-on-surface-variant font-bold text-xs hover:bg-surface-container-lowest transition-all" data-ratio="1.7777777777777777">16:9</button>
                                <button class="ratio-btn py-3 rounded-md bg-surface-container-highest text-on-surface-variant font-bold text-xs hover:bg-surface-container-lowest transition-all" data-ratio="0.6666666666666666">2:3</button>
                                <button class="ratio-btn py-3 rounded-md bg-surface-container-highest text-on-surface-variant font-bold text-xs hover:bg-surface-container-lowest transition-all" data-ratio="0.75">3:4</button>
                                <div class="flex items-center justify-center p-1 border border-outline-variant/10 rounded-md bg-surface-container-low/50">
                                    <button id="flip-h" class="w-full h-full text-primary hover:bg-primary/5 rounded flex items-center justify-center transition-all" title="Flip Horizontal">
                                        <span class="material-symbols-outlined !text-[20px]">swap_horiz</span>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div class="pt-6 space-y-4">
                            <button id="download-btn" class="w-full bg-gradient-to-br from-primary to-primary-dim text-on-primary font-bold py-5 rounded-full text-base shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-3">
                                <span class="material-symbols-outlined">download</span>
                                Save Selection
                            </button>
                            <div class="grid grid-cols-2 gap-4">
                                <button id="new-image-btn" class="bg-surface-container-highest text-on-surface font-semibold py-4 rounded-full text-sm hover:bg-surface-container-lowest transition-all flex items-center justify-center gap-2">
                                    <span class="material-symbols-outlined text-lg">upload</span>
                                    New
                                </button>
                                <a href="tools_page.html" class="bg-surface-container-highest text-on-surface font-semibold py-4 rounded-full text-sm hover:bg-surface-container-lowest transition-all flex items-center justify-center gap-2">
                                    <span class="material-symbols-outlined text-lg">apps</span>
                                    Hub
                                </a>
                            </div>
                        </div>

                        <!-- Decorative dynamic bg -->
                        <div class="absolute -bottom-10 -right-10 w-32 h-32 bg-primary/5 rounded-full blur-2xl"></div>
                    </div>
                </aside>

            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>
    <script src="footer.js"></script>
    <script src="crop_script.js"></script>
</body>

</html>
